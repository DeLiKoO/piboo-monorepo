appId: "com.piboo.app"
productName: "PiBoo"
electronDownload:
  arch: "arm64"
  platform: "linux"
linux:
  target:
    - target: snap
      arch: "arm64"
snap:
  confinement: devmode
  grade: devel
  buildPackages: 
    - libv4l2-dev
  stagePackages:
    - default
    - libv4l2
    - libvips
  plugs:
    - default
    - camera
    - cups
  allowNativeWayland: true
